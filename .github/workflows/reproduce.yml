name: Reproduce

on:
  push:
  pull_request:
  schedule:
    # Living-validation hook: re-run monthly so a new MLPerf round dropped
    # into data/ later (or a pinned-dependency drift) gets caught even
    # without a code change triggering the workflow.
    - cron: "17 6 1 * *"

jobs:
  reproduce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags, not the default shallow (depth=1) clone --
          # 15_export_model_params.py's `git describe --tags` (used for
          # model_params.json's repo_version field, checked by a test)
          # needs tags reachable to resolve to the actual latest release
          # instead of silently falling back to "unknown".
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          # Local dev is 3.9.6, but that exact patch isn't published for
          # ubuntu-latest (24.04) x64 in actions/python-versions -- the
          # oldest available there is 3.9.18. Pin the minor version (3.9)
          # so CI stays in the same major.minor family as local dev and
          # picks up the latest available 3.9.x patch instead of failing
          # to resolve.
          python-version: "3.9"

      - name: Install pinned dependencies
        run: pip install -r requirements.txt

      - name: Run analysis pipeline (02-06)
        # Deliberately excludes 07/11 (need $MLPERF_ROOT, raw repos not
        # cloned here) and 12 (hits live AWS/Azure/OCI pricing APIs --
        # a price snapshot shouldn't re-collect on every push; it's a
        # point-in-time artifact, re-run manually when a fresh snapshot
        # is wanted). 08/09/10/13 aren't run here either, but their
        # substance is re-verified by the pytest step below instead.
        run: |
          cd scripts
          for s in 02_topology_efficiency_model 03_corrected_topology_model \
                   04_rigor_checks 05_deep_checks 06_continuous_bandwidth_model; do
            python3 "${s}.py"
          done

      - name: Run tests
        run: pytest tests/test_reproduction.py -v
